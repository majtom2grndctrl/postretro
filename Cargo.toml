[workspace]
members = [
    "postretro",
    "postretro-level-format",
    "postretro-level-compiler",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[workspace.dependencies]
# Windowing and GPU
winit = "0.30"
wgpu = "29"
pollster = "0.4"

# Math
glam = "0.30"  # pinned for qbsp compatibility

# BSP loading
qbsp = "0.14"

# Map parsing (level compiler)
shambler = "0.2"

# Audio
kira = "0.12"

# Gamepad input
gilrs = "0.11"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
log = "0.4"
env_logger = "0.11"

# Workspace members
postretro-level-format = { path = "postretro-level-format" }

[profile.release]
opt-level = 3
lto = "thin"
strip = "symbols"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 2
