[workspace]
members = [
    "crates/postretro",
    "crates/level-format",
    "crates/level-compiler",
    "crates/script-compiler",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[workspace.dependencies]
# Windowing and GPU
winit = "0.30"
wgpu = "29"
pollster = "0.4"

# Math
glam = { version = "0.32", features = ["serde"] }

# Map parsing (level compiler)
shambler = "0.2"

# Audio
kira = "0.12"

# Gamepad input
gilrs = "0.11"

# Error handling
thiserror = "2"
anyhow = "1"

# Parallelism
rayon = "1"

# Image loading
image = { version = "0.25", default-features = false, features = ["png"] }
# Lower-level PNG decoder — used by prl-build to inspect color-space chunks
# (sRGB, gAMA, iCCP) that the `image` crate does not surface in its public API.
png = "0.18"

# Serialization (scripting FFI transit)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Scripting runtimes (embedded). Default features; `parallel` OFF — scripting
# is single-threaded, `Runtime: Send` is not required. See
# context/plans/in-progress/scripting-foundation/plan-1-runtime-foundation.md §Sub-plan 2.
rquickjs = { version = "0.11", default-features = true }
# `luau` auto-enables vendored mode; do NOT list `vendored` redundantly.
mlua = { version = "0.11", features = ["luau", "serde"] }

# Filesystem watcher (dev-mode hot reload). See
# context/plans/in-progress/scripting-foundation/plan-1-runtime-foundation.md §Sub-plan 7.
notify = "8"
notify-debouncer-full = "0.7"

# Logging
log = "0.4"
env_logger = "0.11"

# Testing
proptest = "1"

# Workspace members
postretro-level-format = { path = "crates/level-format" }

[profile.release]
opt-level = 3
lto = "thin"
strip = "symbols"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 2
